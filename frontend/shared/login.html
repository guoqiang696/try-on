<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>登录 - 云裳.AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          brand: { DEFAULT: '#7c5cff', deep: '#5b34d6', soft: '#a78bfa' },
          ink: { 950: '#0a0810', 900: '#0e0b15', 850: '#13101c', 800: '#191426', 700: '#221b38' },
        },
        fontFamily: {
          sans: ["'Noto Sans SC'", "'Outfit'", 'system-ui', '-apple-system', 'sans-serif'],
        },
      },
    },
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<meta name="theme-color" content="#0e0b15"/>
<style>
  :root { color-scheme: dark; }
  html, body { height: 100%; }
  body { font-family: 'Noto Sans SC', 'Outfit', system-ui, sans-serif; background: #0e0b15; }

  /* 左侧视频区：渐变兜底，视频/海报缺失时不破图 */
  .tb-media {
    background:
      radial-gradient(120% 80% at 20% 0%, rgba(124, 92, 255, 0.28), transparent 60%),
      radial-gradient(100% 90% at 100% 100%, rgba(91, 52, 214, 0.30), transparent 55%),
      linear-gradient(135deg, #1b1430 0%, #0c0a14 100%);
  }
  .tb-media video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .tb-media::after { /* 轻微压暗，保证若叠加文字也清晰 */
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 60%, rgba(14, 11, 21, 0.55) 100%);
    pointer-events: none;
  }

  /* 右侧光晕 */
  .tb-panel-glow {
    background:
      radial-gradient(60% 50% at 100% 0%, rgba(124, 92, 255, 0.16), transparent 70%),
      radial-gradient(50% 40% at 0% 100%, rgba(91, 52, 214, 0.10), transparent 70%);
  }

  /* 输入框 */
  .tb-input {
    width: 100%;
    background: #17131f;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    padding: 15px 16px;
    color: #ece9f5;
    font-size: 15px;
    transition: border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
  }
  .tb-input::placeholder { color: #6b6680; }
  .tb-input:hover { border-color: rgba(167, 139, 250, 0.35); }
  .tb-input:focus {
    outline: none;
    background: #181226;
    border-color: #7c5cff;
    box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.18), 0 0 22px rgba(124, 92, 255, 0.22);
  }

  /* 登录按钮 */
  .tb-submit {
    width: 100%;
    border-radius: 14px;
    padding: 15px 16px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: #fff;
    background: linear-gradient(135deg, #8b6bff 0%, #6a3ff0 55%, #5b34d6 100%);
    box-shadow: 0 12px 30px rgba(124, 92, 255, 0.35);
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  .tb-submit:hover { transform: translateY(-1px); box-shadow: 0 16px 38px rgba(124, 92, 255, 0.45); }
  .tb-submit:active { transform: translateY(0); }
  .tb-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; letter-spacing: 0.05em; }

  .tb-brand-icon {
    background: linear-gradient(140deg, #8b6bff 0%, #5b34d6 100%);
    box-shadow: 0 8px 22px rgba(124, 92, 255, 0.4);
  }

  /* 多段背景视频交叉淡入轮播 */
  .tb-slides { position: absolute; inset: 0; }
  .tb-media .tb-slide {
    opacity: 0;
    transition: opacity 1.1s ease;
    will-change: opacity;
  }
  .tb-media .tb-slide.is-active { opacity: 1; z-index: 2; }

  /* 底部指示点 */
  .tb-dots {
    position: absolute;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 5;
  }
  .tb-dot {
    width: 7px;
    height: 7px;
    padding: 0;
    border: 0;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.4);
    cursor: pointer;
    transition: width .35s ease, background-color .35s ease;
  }
  .tb-dot:hover { background: rgba(255, 255, 255, 0.7); }
  .tb-dot.is-active { width: 22px; background: #fff; }
</style>
</head>
<body class="text-white antialiased">
  <main class="min-h-screen grid grid-cols-1 md:grid-cols-2">
    <!-- 左：视频轮播 -->
    <section class="tb-media relative hidden md:block" aria-label="背景视频轮播">
      <div class="tb-slides" id="tb-slides">
        <video class="tb-slide is-active" muted playsinline preload="auto" poster="assets/login-poster.jpg">
          <source src="assets/login-bg.mp4" type="video/mp4"/>
        </video>
        <video class="tb-slide" muted playsinline preload="auto">
          <source src="assets/login-bg1.mp4" type="video/mp4"/>
        </video>
        <video class="tb-slide" muted playsinline preload="auto">
          <source src="assets/login-bg2.mp4" type="video/mp4"/>
        </video>
        <video class="tb-slide" muted playsinline preload="auto">
          <source src="assets/login-bg3.mp4" type="video/mp4"/>
        </video>
      </div>
      <div class="tb-dots" id="tb-dots"></div>
    </section>

    <!-- 右：登录表单 -->
    <section class="tb-panel-glow relative flex items-center justify-center px-6 py-12 sm:px-10 bg-ink-900">
      <div class="w-full max-w-[400px]">
        <!-- 品牌 -->
        <div class="flex items-center gap-3 mb-12">
          <div class="tb-brand-icon flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl text-[22px] font-bold leading-none">Y</div>
          <div class="leading-tight">
            <p class="text-[19px] font-bold tracking-tight">云裳.AI</p>
            <p class="text-[12px] font-medium text-brand-soft">让美好，被看见。</p>
          </div>
        </div>

        <!-- 标题 -->
        <h1 class="text-[34px] sm:text-[38px] font-bold leading-tight">欢迎回来</h1>
        <p class="mt-2 text-[14px] text-[#9a95ad]">登录您的账户，开启 AI 创作之旅</p>

        <!-- 表单 -->
        <form id="tb-login-form" class="mt-9 space-y-5" novalidate>
          <div>
            <label for="tb-email" class="mb-2 block text-[13px] font-medium text-[#b8b3c9]">邮箱</label>
            <input id="tb-email" name="email" type="email" class="tb-input" placeholder="请输入邮箱"
                   autocomplete="email" autocapitalize="none" spellcheck="false" required/>
          </div>
          <div>
            <label for="tb-password" class="mb-2 block text-[13px] font-medium text-[#b8b3c9]">密码</label>
            <input id="tb-password" name="password" type="password" class="tb-input" placeholder="请输入密码"
                   autocomplete="current-password" required/>
          </div>

          <p id="tb-error" role="alert" aria-live="polite" class="hidden text-[13px] text-[#ff6b6b]"></p>

          <button id="tb-submit" type="submit" class="tb-submit mt-2">登&nbsp;录</button>
        </form>

        <!-- 协议 -->
        <p class="mt-6 text-center text-[12.5px] text-[#7c7790]">
          登录即代表同意
          <a href="#" class="text-brand-soft hover:text-brand">《用户协议》</a>
          和
          <a href="#" class="text-brand-soft hover:text-brand">《隐私政策》</a>
        </p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var TOKEN_KEY = "opc-token";
      var API_BASE = window.OPC_API_BASE || "";

      var form = document.getElementById("tb-login-form");
      var emailEl = document.getElementById("tb-email");
      var passwordEl = document.getElementById("tb-password");
      var submitEl = document.getElementById("tb-submit");
      var errorEl = document.getElementById("tb-error");

      // 登录成功后的跳转目标：仅接受同源相对路径，避免开放重定向
      function safeRedirect() {
        var raw = new URLSearchParams(location.search).get("redirect");
        if (raw && /^\/(?!\/)/.test(raw)) return raw;
        return "/";
      }

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.remove("hidden");
      }
      function clearError() {
        errorEl.textContent = "";
        errorEl.classList.add("hidden");
      }

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        clearError();

        var email = emailEl.value.trim();
        var password = passwordEl.value;
        if (!email || !password) {
          showError("请输入邮箱和密码");
          return;
        }

        submitEl.disabled = true;
        var label = submitEl.innerHTML;
        submitEl.textContent = "登录中…";

        try {
          var response = await fetch(API_BASE + "/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, password: password }),
          });
          var data = await response.json().catch(function () { return {}; });
          if (!response.ok) {
            throw new Error(data.detail || "登录失败，请稍后再试");
          }
          localStorage.setItem(TOKEN_KEY, data.token);
          window.location.href = safeRedirect();
        } catch (err) {
          showError(err && err.message ? err.message : "网络错误，请稍后再试");
          submitEl.disabled = false;
          submitEl.innerHTML = label;
        }
      });
    })();
  </script>

  <script>
    // 左侧背景视频轮播：多段交叉淡入，每段最长展示 SLIDE_MS，或该段自然播完即切
    (function () {
      var slides = Array.prototype.slice.call(document.querySelectorAll("#tb-slides .tb-slide"));
      var dotsWrap = document.getElementById("tb-dots");
      if (!slides.length) return;

      // 只有一段：单纯循环播放，不启用轮播逻辑
      if (slides.length < 2) {
        slides[0].setAttribute("loop", "");
        try { slides[0].play(); } catch (e) {}
        if (dotsWrap) dotsWrap.style.display = "none";
        return;
      }

      var SLIDE_MS = 8000; // 每段最长展示时间（毫秒）
      var current = 0;
      var timer = null;

      // 生成底部指示点
      slides.forEach(function (_, i) {
        var dot = document.createElement("button");
        dot.type = "button";
        dot.className = "tb-dot" + (i === 0 ? " is-active" : "");
        dot.setAttribute("aria-label", "切换到第 " + (i + 1) + " 段背景");
        dot.addEventListener("click", function () { go(i); });
        dotsWrap.appendChild(dot);
      });
      var dots = Array.prototype.slice.call(dotsWrap.children);

      function setActive(index) {
        slides.forEach(function (v, i) { v.classList.toggle("is-active", i === index); });
        dots.forEach(function (d, i) { d.classList.toggle("is-active", i === index); });
      }

      function playCurrent() {
        var v = slides[current];
        try { v.currentTime = 0; } catch (e) {}
        var p = v.play();
        if (p && typeof p.then === "function") p.catch(function () {});
        // 预热下一段，避免切换时出现加载卡顿
        var next = slides[(current + 1) % slides.length];
        next.preload = "auto";
      }

      function go(index) {
        clearTimeout(timer);
        try { slides[current].pause(); } catch (e) {}
        current = (index + slides.length) % slides.length;
        setActive(current);
        playCurrent();
        timer = setTimeout(function () { go(current + 1); }, SLIDE_MS);
      }

      // 某段播完立即推进（视频较短时兜底，防止画面静止）
      slides.forEach(function (v) {
        v.addEventListener("ended", function () { go(current + 1); });
      });

      // 启动
      setActive(0);
      playCurrent();
      timer = setTimeout(function () { go(1); }, SLIDE_MS);

      // 标签页隐藏时暂停，回来后从当前段继续，避免后台空转
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          clearTimeout(timer);
          try { slides[current].pause(); } catch (e) {}
        } else {
          playCurrent();
          timer = setTimeout(function () { go(current + 1); }, SLIDE_MS);
        }
      });
    })();
  </script>
</body>
</html>
