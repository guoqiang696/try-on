<main data-main tabindex="-1" class="opc-workspace-page">
<div class="opc-tab-group opc-tab-group--standalone" data-opc-gallery-tabs>
<button type="button" class="is-active" data-opc-gallery-filter="all">全部</button>
<button type="button" data-opc-gallery-filter="active">进行中</button>
<button type="button" data-opc-gallery-filter="done">已完成</button>
</div>
<div class="glass-panel opc-panel opc-toolbar">
<div class="flex flex-wrap items-center gap-2">
<span class="opc-toolbar-label">模式</span>
<button type="button" class="opc-chip is-active">模特试衣</button>
<button type="button" class="opc-chip">真人试衣</button>
<button type="button" class="opc-chip">自由风格</button>
</div>
<div class="flex items-center gap-3">
<div class="relative">
<select class="opc-select">
<option>所有场景</option>
<option>影棚灯光</option>
<option>户外都市</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-[18px]">expand_more</span>
</div>
<button type="button" class="opc-icon-btn" aria-label="高级筛选">
<span class="material-symbols-outlined text-[20px]">tune</span>
</button>
</div>
</div>
<div class="opc-gallery-grid">
<!-- 生成中（有任务时显示） -->

<div class="relative w-20 h-20 flex items-center justify-center">
<svg class="w-full h-full -rotate-90" aria-hidden="true">
<circle class="text-surface-variant" cx="40" cy="40" fill="transparent" r="36" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary" cx="40" cy="40" fill="transparent" r="36" stroke="currentColor" stroke-dasharray="226.2" stroke-dashoffset="226.2" stroke-width="4" data-opc-gallery-progress-ring></circle>
</svg>
<span class="absolute text-sm font-bold text-primary" data-opc-gallery-progress-text>0%</span>
</div>
</div>
<div class="opc-gallery-card-footer">
<p class="opc-gallery-card-title" data-opc-gallery-title>试衣效果图</p>
<span class="opc-gallery-card-time is-status">正在生成中…</span>
<div class="opc-gallery-card-tags">
<span class="opc-tag bg-primary/10 text-primary" data-opc-gallery-mode-tag>模特试衣</span>
</div>
</div>
</div>
