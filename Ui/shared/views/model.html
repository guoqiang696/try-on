<p class="opc-upload-title relative z-10">点击或拖拽上传</p>
<p class="opc-upload-hint relative z-10">上传平铺或透明人体模型图，支持 PNG / JPG，上传后将自动压缩</p>
<div class="opc-upload-extra relative z-10">
<div class="flex items-center gap-4 w-full px-2">
<div class="h-[1px] bg-gradient-to-r from-transparent via-outline-variant/50 to-transparent flex-1"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider bg-white/50 px-2 py-1 rounded-md backdrop-blur-sm">或</span>
<div class="h-[1px] bg-gradient-to-r from-transparent via-outline-variant/50 to-transparent flex-1"></div>
</div>
<div class="w-full mt-4 relative">
<label class="sr-only" for="url-input">产品链接</label>
<div class="relative flex items-center w-full group">
<div class="absolute inset-0 bg-white/40 rounded-xl blur-md group-hover:bg-primary/5 transition-colors -z-10"></div>
<span class="material-symbols-outlined absolute left-4 text-outline/80">link</span>
<input autocomplete="off" class="w-full bg-white/60 dark:bg-black/20 backdrop-blur-md border border-white/50 focus:border-primary/60 focus:ring-2 focus:ring-primary/20 rounded-xl py-3.5 pl-12 pr-24 font-body-md text-body-md text-on-surface placeholder:text-outline/70 transition-[border-color,box-shadow] shadow-inner" id="url-input" inputmode="url" name="product-url" placeholder="粘贴产品图像 URL…" spellcheck="false" type="url"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-primary text-primary hover:text-white border border-white hover:border-primary shadow-sm font-label-md text-label-md px-4 py-1.5 rounded-lg transition-all duration-300">获取</button>
</div>
</div>
</div>
</div>
<!-- Category Pills -->
<div class="mt-4">
<p class="font-label-sm text-label-sm text-on-surface-variant mb-3 uppercase tracking-wider">选择服装类型</p>
<div class="flex flex-wrap gap-2.5">
<button class="opc-chip is-active">上衣</button>
<button class="opc-chip">外套</button>
<button class="opc-chip">连衣裙</button>
<button class="opc-chip">裤子</button>
<button class="opc-chip">套装</button>

</div>
</div>

</div>
<div class="opc-summary-row">
<div class="opc-summary-row-icon"><span class="material-symbols-outlined">checkroom</span></div>
<div class="opc-summary-row-text">

</div>
</div>

<button aria-label="减少数量" type="button"><span class="material-symbols-outlined text-[16px]">remove</span></button>
<span data-opc-quantity>1 张图片</span>
<button aria-label="增加数量" type="button"><span class="material-symbols-outlined text-[16px]">add</span></button>
</div>
</div>

</div>

</button>
<p class="opc-summary-note">提交后可在「我的作品」查看生成进度，完成后自动保存</p>
</div>
</section>
