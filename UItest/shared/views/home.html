<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mb-10" data-rb-blur-text data-rb-fade-up>

<div class="flex flex-col sm:flex-row gap-4 items-center justify-center" data-rb-fade-up data-delay="2">
<button type="button" data-goto="model" data-rb-magnet class="rb-star-border bg-gradient-primary text-white font-label-md text-label-md px-8 py-4 rounded-full cta-glow hover:-translate-y-0.5 transition-[transform,box-shadow] duration-200 flex items-center gap-2"><span class="material-symbols-outlined" data-icon="magic_button">magic_button</span>开始试衣
