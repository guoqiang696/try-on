<main data-main tabindex="-1" class="opc-workspace-page">
<div class="opc-workspace-grid">
<!-- Left: Reference Area -->
<div class="opc-col-left flex flex-col gap-gutter">
<div class="glass-panel opc-panel opc-panel--upload-host flex flex-col">
<div class="opc-step-header">
<div class="opc-step" data-opc-step="1"><span class="opc-step-badge">1</span><h2 class="opc-step-title">参考图片</h2></div>
<label class="flex items-center gap-2 cursor-pointer bg-surface px-3 py-1.5 rounded-lg border border-outline-variant/50 hover:bg-surface-container-high transition-colors shrink-0">
<input class="form-checkbox text-primary rounded border-outline-variant focus:ring-primary" data-opc-no-image type="checkbox"/>
<span class="font-label-sm text-on-surface-variant font-medium">无图模式</span>
</label>
</div>
<div class="opc-upload" data-opc-ref-upload>
<div class="opc-upload-icon"><span class="material-symbols-outlined">add_photo_alternate</span></div>
<p class="opc-upload-title">点击或拖拽上传</p>
<p class="opc-upload-hint">支持 PNG / JPG，上传后将自动压缩</p>
</div>
</div>
</div>
<!-- Middle: Creative Parameters -->
<div class="opc-col-mid flex flex-col gap-gutter">
<div class="glass-panel opc-panel flex flex-col">
<div class="opc-step" data-opc-step="2"><span class="opc-step-badge">2</span><h2 class="opc-step-title">创作参数</h2></div>
<div class="opc-form-block mb-4">
<h3 class="opc-form-block-title"><span class="material-symbols-outlined">accessibility_new</span> 人物属性</h3>
<div class="flex flex-col gap-3">
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1.5">性别</label>
<div class="flex flex-wrap gap-2">
<button type="button" class="opc-chip is-active">女</button>
<button type="button" class="opc-chip">男</button>
<button type="button" class="opc-chip">不限</button>
</div>
</div>
<div class="grid grid-cols-2 gap-2">
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="free-height-input">身高 (cm)</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-3 py-2 font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-[border-color,box-shadow]" id="free-height-input" inputmode="numeric" name="free-height" placeholder="170" type="number"/>
</div>
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="free-age-input">年龄</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-3 py-2 font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-[border-color,box-shadow]" id="free-age-input" inputmode="numeric" name="free-age" placeholder="25" type="number"/>
</div>
</div>
<div>
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-1.5">体型</label>
<div class="flex flex-wrap gap-2">
<button type="button" class="opc-chip is-active">标准</button>
<button type="button" class="opc-chip">偏瘦</button>
<button type="button" class="opc-chip">运动</button>
<button type="button" class="opc-chip">丰满</button>
<button type="button" class="opc-chip">壮硕</button>
</div>
</div>
</div>
</div>
<div class="opc-form-block flex flex-col flex-1">
<div class="flex justify-between items-center mb-2">
<h3 class="opc-form-block-title !mb-0"><span class="material-symbols-outlined">edit_note</span> 描述</h3>
<button type="button" class="flex items-center gap-1 text-primary hover:text-primary-fixed-variant font-label-sm transition-colors bg-primary/5 px-2 py-1 rounded-md border border-primary/20">
<span class="material-symbols-outlined text-[16px]">auto_awesome</span> 自动总结
</button>
</div>
<label class="sr-only" for="prompt-input">风格描述</label>
<textarea class="opc-free-desc w-full rounded-lg border border-outline-variant/60 bg-surface focus:border-primary focus:ring-1 focus:ring-primary p-3 font-body-md text-on-surface placeholder:text-outline shadow-inner" id="prompt-input" name="prompt" placeholder="描述您想要的场景、风格与画面细节…"></textarea>
</div>
</div>
</div>
<!-- Right: Preview Config -->
<div class="opc-col-right flex flex-col gap-gutter">
<div class="glass-panel opc-panel opc-panel--sticky opc-summary-panel" data-opc-base-cost="40">
<h2 class="opc-summary-title">任务摘要</h2>
<div class="opc-summary-rows">
<div class="opc-summary-row">
<div class="opc-summary-row-icon"><span class="material-symbols-outlined">image</span></div>
<div class="opc-summary-row-text">
<p class="opc-summary-row-label">参考图片</p>
<p class="opc-summary-row-value is-muted" data-opc-summary-ref>未上传</p>
</div>
</div>
<div class="opc-summary-row">
<div class="opc-summary-row-icon"><span class="material-symbols-outlined">accessibility_new</span></div>
<div class="opc-summary-row-text">
<p class="opc-summary-row-label">人物属性</p>
<p class="opc-summary-row-value">女 · 标准</p>
</div>
</div>
<div class="opc-summary-row">
<div class="opc-summary-row-icon"><span class="material-symbols-outlined">edit_note</span></div>
<div class="opc-summary-row-text">
<p class="opc-summary-row-label">描述</p>
<p class="opc-summary-row-value is-muted" data-opc-summary-desc>尚未填写</p>
</div>
</div>
</div>
<div class="opc-summary-divider"></div>
<div class="opc-summary-field">
<span class="opc-summary-field-label">生成数量</span>
<div class="opc-qty-stepper">
<button aria-label="减少数量" type="button"><span class="material-symbols-outlined text-[16px]">remove</span></button>
<span>4 张图片</span>
<button aria-label="增加数量" type="button"><span class="material-symbols-outlined text-[16px]">add</span></button>
</div>
</div>
<div class="opc-summary-cost">
<span class="opc-summary-cost-label">预估消耗</span>
<span class="opc-summary-cost-value"><span class="material-symbols-outlined">monetization_on</span> 40 积分</span>
</div>
<button type="button" data-opc-generate class="opc-summary-cta cta-glow is-disabled" aria-disabled="true">
<span class="material-symbols-outlined">auto_awesome</span> 生成
</button>
</div>
</div>
</div>
</main>
